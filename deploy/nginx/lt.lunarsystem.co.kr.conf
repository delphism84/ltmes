# LTMES — https://lt.lunarsystem.co.kr
# FE: 127.0.0.1:63105 — Docker(compose) 또는 systemd `npm run dev:bind` (deploy/systemd/)
# BE: 127.0.0.1:48998 — Docker 또는 systemd `npm run dev`
# 적용: sudo cp deploy/nginx/lt.lunarsystem.co.kr.conf /etc/nginx/sites-available/lt.lunarsystem.co.kr
#       sudo ln -sf /etc/nginx/sites-available/lt.lunarsystem.co.kr /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
# 인증서: sudo certbot certonly --webroot -w /var/www/html -d lt.lunarsystem.co.kr

server {
  listen 80;
  listen [::]:80;
  server_name lt.lunarsystem.co.kr;

  location /.well-known/acme-challenge/ {
    root /var/www/html;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# 같은 443 소켓에 다른 vhost 가 http2 on 이면 전역으로 h2가 켜질 수 있음 → 이 server 블록에서만 끔 (nginx 1.25+).
# WebSocket 은 HTTP/1.1 Upgrade 가 필요함.
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 off;
  server_name lt.lunarsystem.co.kr;

  ssl_certificate /etc/letsencrypt/live/lt.lunarsystem.co.kr/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/lt.lunarsystem.co.kr/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  access_log /var/log/nginx/lt_lunarsystem_access.log;
  error_log  /var/log/nginx/lt_lunarsystem_error.log;

  # LTMES BE 48998 — api + 2채널 WSS(/ws/ingest, /ws/app). location ^~ /ws 가 /ws/* 전부 프록시
  location ^~ /api/ {
    proxy_pass http://127.0.0.1:48998;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 4m;
  }

  location ^~ /ws {
    proxy_pass http://127.0.0.1:48998;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
    proxy_buffering off;
    proxy_request_buffering off;
  }

  location = /health {
    proxy_pass http://127.0.0.1:48998/health;
    proxy_set_header Host $host;
  }

  # Next 정적 청크 — HTML과 분리해 immutable 캐시 (HTML만 no-store 는 아래 location /)
  location ^~ /_next/static/ {
    proxy_pass http://127.0.0.1:63105;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering on;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location / {
    proxy_pass http://127.0.0.1:63105;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    # Next Full Route Cache 로 오래된 HTML이 남으면 청크 400 / ChunkLoadError — HTML은 캐시하지 않음
    proxy_hide_header x-nextjs-cache;
    proxy_hide_header Cache-Control;
    add_header Cache-Control "no-store, must-revalidate" always;
  }
}
